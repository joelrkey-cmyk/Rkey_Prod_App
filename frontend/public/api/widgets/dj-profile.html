<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil DJ - R'Key Prod</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: transparent;
            height: auto !important;
            overflow: hidden;
        }
        body {
            background: transparent;
            height: auto !important;
            overflow: hidden;
            padding: 4px 10px;
        }

        .profile-container { max-width: 600px; margin: 0 auto; }

        .profile-card {
            background: #1E2433;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: row;
            border-bottom: 3px solid #FF6600;
            min-height: 0;
        }

        /* ── LEFT: Photo ── */
        .profile-left {
            position: relative;
            flex-shrink: 0;
            width: 180px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px 16px;
        }
        .profile-photo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,102,0,0.4);
            display: block;
        }
        .profile-photo-placeholder {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6600 0%, #cc5200 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            border: 3px solid rgba(255,102,0,0.4);
        }
        .profile-badge {
            position: absolute;
            top: 12px;
            right: -6px;
            background: #FF6600;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            white-space: nowrap;
            z-index: 2;
        }

        /* ── RIGHT: Content ── */
        .profile-right {
            flex: 1;
            padding: 18px 20px 16px 4px;
            display: flex;
            flex-direction: column;
            min-width: 0;
            color: white;
        }
        .profile-name {
            font-size: 20px;
            font-weight: 700;
            color: white;
            margin-bottom: 2px;
            line-height: 1.2;
        }
        .profile-subtitle {
            font-size: 13px;
            color: #9ca3af;
            font-style: italic;
            margin-bottom: 10px;
        }

        /* ── BIO ACCORDION ── */
        .profile-bio {
            font-size: 13px;
            line-height: 1.55;
            color: #c9cdd3;
            margin-bottom: 4px;
            overflow: hidden;
            max-height: 500px;
            transition: max-height 0.4s ease;
        }
        .profile-bio.collapsed {
            max-height: 4.65em; /* ~3 lines */
        }
        .profile-bio-toggle {
            background: none;
            border: none;
            color: #FF6600;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            padding: 0;
            margin-bottom: 10px;
            display: inline-block;
            transition: color 0.2s;
        }
        .profile-bio-toggle:hover { color: #ff8533; }

        /* ── SPECIALTIES ── */
        .profile-specialties {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }
        .specialty-tag {
            background: rgba(255,102,0,0.15);
            color: #FF6600;
            padding: 3px 10px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }

        /* ── SOCIAL ICONS ── */
        .profile-social {
            display: flex;
            gap: 8px;
            margin-top: auto;
        }
        .social-link {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            transition: transform 0.2s, opacity 0.2s;
        }
        .social-link:hover {
            transform: translateY(-2px);
            opacity: 0.85;
        }

        /* ── LOADING / ERROR ── */
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #FF6600;
            font-size: 16px;
            font-weight: 600;
            background: #000;
            border-radius: 12px;
        }
        .error {
            text-align: center;
            padding: 40px 20px;
            font-size: 14px;
            background: #000;
            border-radius: 12px;
            color: white;
        }

        /* ── MOBILE ── */
        @media (max-width: 480px) {
            .profile-left { width: 120px; padding: 16px 10px; }
            .profile-photo, .profile-photo-placeholder { width: 96px; height: 96px; font-size: 36px; }
            .profile-right { padding: 14px 14px 12px 4px; }
            .profile-name { font-size: 17px; }
            .profile-subtitle { font-size: 12px; }
            .profile-bio { font-size: 12px; }
            .profile-badge { font-size: 9px; padding: 3px 8px; }
            .specialty-tag { font-size: 10px; padding: 2px 8px; }
            .social-link { width: 28px; height: 28px; }
            .social-link svg { width: 16px; height: 16px; }
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <div id="profile-content" class="loading">Chargement du profil...</div>
    </div>

    <script>
        // API URL
        var API_URL = '/api/dj-fiches/public';
        var urlParams = new URLSearchParams(window.location.search);
        var profileId = urlParams.get('id');

        var BIO_CHAR_LIMIT = 150;
        var _lastSentHeight = 0;

        function getContentHeight() {
            var container = document.querySelector('.profile-container');
            if (!container) return 0;
            var rect = container.getBoundingClientRect();
            // Add body padding (top + bottom)
            return Math.ceil(rect.height) + 8;
        }

        function applyHeight(h) {
            if (h < 20) return;
            if (Math.abs(h - _lastSentHeight) < 2) return;
            _lastSentHeight = h;
            // Method 1: Same-origin — direct iframe resize
            try {
                if (window.frameElement) {
                    window.frameElement.style.height = h + 'px';
                }
            } catch(e) { /* cross-origin, ignore */ }
            // Method 2: Cross-origin — postMessage
            if (window.parent !== window) {
                window.parent.postMessage({ type: 'rkey-widget-resize', height: h }, '*');
            }
        }

        function sendHeightToParent() {
            applyHeight(getContentHeight());
        }

        function toggleBio() {
            var bio = document.getElementById('bio-text');
            var btn = document.getElementById('bio-toggle');
            if (!bio || !btn) return;
            var isCollapsed = bio.classList.contains('collapsed');
            if (isCollapsed) {
                bio.classList.remove('collapsed');
                btn.textContent = 'Réduire';
            } else {
                bio.classList.add('collapsed');
                btn.textContent = 'Lire la suite...';
            }
            // Send height during the entire CSS transition (400ms)
            var frames = 0;
            var transitionLoop = setInterval(function() {
                sendHeightToParent();
                frames++;
                if (frames > 25) clearInterval(transitionLoop);
            }, 20);
        }

        async function loadProfile() {
            var container = document.getElementById('profile-content');
            if (!profileId) {
                container.className = '';
                container.innerHTML = '<div class="error">Aucun profil spécifié.</div>';
                setTimeout(sendHeightToParent, 100);
                return;
            }
            try {
                var response = await fetch(API_URL + '/' + profileId);
                if (!response.ok) throw new Error('Profil non trouvé');
                var profile = await response.json();
                renderProfile(profile);
                setTimeout(sendHeightToParent, 100);
            } catch (error) {
                console.error('Erreur:', error);
                container.className = '';
                container.innerHTML = '<div class="error">Impossible de charger le profil. <br><span style="font-size:10px;opacity:0.7">ERR: ' + error.message + '</span></div>';
                setTimeout(sendHeightToParent, 100);
            }
        }

        function renderProfile(profile) {
            var container = document.getElementById('profile-content');
            container.className = '';
            var html = '<div class="profile-card">';

            // ── LEFT: Photo + Badge ──
            html += '<div class="profile-left">';
            var photoUrl = profile.photo_url;
            if (photoUrl && photoUrl.startsWith('/')) {
                var parsedUrl = new URL(window.location.href);
                var BASE_URL = parsedUrl.protocol + '//' + parsedUrl.host;
                photoUrl = BASE_URL + photoUrl;
            }
            if (photoUrl) {
                html += '<img src="' + photoUrl + '" alt="' + profile.nom_artistique + '" class="profile-photo">';
            } else {
                html += '<div class="profile-photo-placeholder">🎧</div>';
            }
            if (profile.titre) {
                html += '<span class="profile-badge">' + profile.titre + '</span>';
            }
            html += '</div>';

            // ── RIGHT: Content ──
            html += '<div class="profile-right">';
            html += '<div class="profile-name">' + profile.nom_artistique + '</div>';
            if (profile.sous_titre) {
                html += '<div class="profile-subtitle">' + profile.sous_titre + '</div>';
            }

            // Bio with 150-char accordion
            if (profile.biographie) {
                var fullBio = profile.biographie;
                var needsToggle = fullBio.length > BIO_CHAR_LIMIT;
                html += '<div class="profile-bio' + (needsToggle ? ' collapsed' : '') + '" id="bio-text">' + fullBio + '</div>';
                if (needsToggle) {
                    html += '<button class="profile-bio-toggle" id="bio-toggle" onclick="toggleBio()">Lire la suite...</button>';
                }
            }

            // Specialties
            if (profile.specialites && profile.specialites.length > 0) {
                html += '<div class="profile-specialties">';
                profile.specialites.forEach(function(spec) {
                    html += '<span class="specialty-tag">' + spec + '</span>';
                });
                html += '</div>';
            }

            // Social icons (aligned left)
            var hasLinks = profile.lien_instagram || profile.lien_facebook || profile.lien_youtube || profile.lien_tiktok;
            if (hasLinks) {
                html += '<div class="profile-social">';
                if (profile.lien_instagram) {
                    html += '<a href="' + profile.lien_instagram + '" target="_blank" class="social-link" title="Instagram" style="background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);">' +
                        '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg></a>';
                }
                if (profile.lien_facebook) {
                    html += '<a href="' + profile.lien_facebook + '" target="_blank" class="social-link" title="Facebook" style="background:#1877f2;">' +
                        '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></a>';
                }
                if (profile.lien_youtube) {
                    html += '<a href="' + profile.lien_youtube + '" target="_blank" class="social-link" title="YouTube" style="background:#ff0000;">' +
                        '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg></a>';
                }
                if (profile.lien_tiktok) {
                    html += '<a href="' + profile.lien_tiktok + '" target="_blank" class="social-link" title="TikTok" style="background:#010101;border:1px solid #333;">' +
                        '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg></a>';
                }
                html += '</div>';
            }

            html += '</div></div>';
            container.innerHTML = html;

            // Wait for image to load before sending height
            var img = container.querySelector('.profile-photo');
            if (img) {
                img.onload = function() { setTimeout(sendHeightToParent, 100); };
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadProfile);
        } else {
            loadProfile();
        }

        // Observe size changes and send height updates
        var _profileContainer = document.querySelector('.profile-container');
        if (typeof ResizeObserver !== 'undefined' && _profileContainer) {
            new ResizeObserver(sendHeightToParent).observe(_profileContainer);
        }
        // Initial + periodic checks until stable
        sendHeightToParent();
        var _checkCount = 0;
        var _checkInterval = setInterval(function() {
            sendHeightToParent();
            if (++_checkCount >= 15) clearInterval(_checkInterval);
        }, 200);
    </script>
</body>
</html>
